name: ✨ Prettier Check

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  prettier:
    name: ✨ Prettier
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install dependencies
        run: pnpm install

      - name: ✨ Check Formatting
        run: pnpm format
