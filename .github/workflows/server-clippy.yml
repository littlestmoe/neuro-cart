name: 🦀 Server Clippy

on:
  push:
    branches: ["main", "master"]
    paths:
      - "servers/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "servers/**"

jobs:
  clippy:
    name: 🦀 Clippy
    runs-on: ubuntu-latest

    strategy:
      matrix:
        server:
          - cart-server
          - order-server
          - payment-server
          - product-server
          - review-server
          - user-server

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 📦 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            servers/${{ matrix.server }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.server }}-${{ hashFiles(format('servers/{0}/Cargo.lock', matrix.server)) }}

      - name: 🔍 Run Clippy
        working-directory: servers/${{ matrix.server }}
        run: cargo clippy -- -D warnings
